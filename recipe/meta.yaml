{% set name = "memory-allocator" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/memory_allocator-{{ version }}.tar.gz
  sha256: 675d3c91019db98c97441de73d5c648821e5ae813f3f54cd09863d474b48fe26

build:
  number: 0
  skip: true  # [py2k]
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - cython                               # [build_platform != target_platform]
    - cross-python_{{ target_platform }}   # [build_platform != target_platform]
    - python                               # [build_platform != target_platform]
    - pip                                  # [build_platform != target_platform]
  host:
    - cython
    - pip
    - setuptools
    - python
  run:
    # this is an extension to cython, so cython is needed at runtime
    - cython
    - python

test:
  imports:
    - memory_allocator
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/kliem/memory_allocator
  summary: An extension class to allocate memory easily with cython
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - isuruf
